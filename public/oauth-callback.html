<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Authentification…</title></head>
<body>
<script>
  (function () {
    var hash = window.location.hash;
    if (!hash) { window.close(); return; }
    var params = new URLSearchParams(hash.slice(1));
    var token     = params.get('access_token');
    var expiresIn = parseInt(params.get('expires_in') || '3400', 10);
    if (token && window.opener) {
      window.opener.postMessage({ type: 'oauth_token', token: token, expiresIn: expiresIn }, window.location.origin);
    }
    window.close();
  })();
</script>
<p style="font-family:sans-serif;text-align:center;padding:40px;color:#888">Authentification en cours…</p>
</body>
</html>
